<style>
* { box-sizing: border-box; }
:root {
  --paper: #fbf6ec; --ink: #1f2929; --muted: #786f63; --red: #c42f2d;
  --gold: #a36d35; --line: rgba(120,93,58,.18); --card-bg: #fffdf8;
}
html, body { margin:0; min-height:100%; max-width:100%; overflow-x:hidden; color:var(--ink); background:var(--paper); font-family:"Noto Serif SC","Songti SC","STSong",serif; }
body {
  display:flex; justify-content:center;
  background:linear-gradient(180deg,#fffaf3 0%,#f8efe4 55%,#f6eadc 100%);
}
a { color:inherit; text-decoration:none; }
.phone { width:min(100vw,430px); min-height:100vh; padding:0 12px 102px; position:relative; }

/* header */
.tools-hero {
  min-height:64px; margin:0 -12px 12px; padding:16px 24px 10px; position:relative;
  overflow:hidden; border-radius:0 0 20px 20px;
}
.tools-hero::before {
  content:""; position:absolute; inset:0;
  background-image:linear-gradient(90deg,rgba(255,251,244,.28) 0%,rgba(255,251,244,.12) 34%,rgba(255,251,244,.02) 70%,rgba(255,251,244,0) 100%),linear-gradient(180deg,rgba(255,251,244,.05),rgba(255,251,244,0) 58%),url("/v2-preview/assets/hero-reeds.webp");
  background-size:cover; background-position:center;
}
.tools-hero h1, .tools-hero p { position:relative; z-index:1; }
.tools-hero h1 { margin:0 0 6px; font-size:28px; letter-spacing:2px; font-weight:700; }
.tools-hero p { margin:0; font-size:14px; letter-spacing:3px; color:#303536; }
.brand-seal { display:inline-block; writing-mode:vertical-rl; margin-left:6px; padding:3px 2px;
  color:#fff; background:var(--red); border-radius:5px; font-size:11px; letter-spacing:1px; vertical-align:middle; }
.sub-row { display:flex; justify-content:space-between; align-items:center; margin-top:6px; position:relative; z-index:1; }
.nav-arrows { display:flex; gap:4px; }
.nav-btn-sm { width:32px; height:32px; display:grid; place-items:center; border:1px solid var(--line);
  border-radius:50%; background:rgba(255,255,255,.6); color:var(--muted); font-size:16px; cursor:pointer; }
.back-link { font-size:13px; color:var(--muted); border:1px solid var(--line); border-radius:14px; padding:3px 12px; }

/* date hero */
.date-hero { text-align:center; padding:16px 0 10px; }
.date-hero .big-date { font-size:20px; color:var(--ink); margin-bottom:4px; }
.date-hero .big-lunar { font-size:36px; font-weight:bold; color:var(--red); }
.date-hero .ganzhi-row { font-size:14px; color:var(--muted); margin-top:6px; }

/* cards */
.card { background:var(--card-bg); border-radius:16px; padding:16px; margin-bottom:10px;
  border:1px solid var(--line); box-shadow:0 2px 8px rgba(61,49,31,.05); }
.section-title { font-size:15px; font-weight:bold; color:var(--red); margin-bottom:10px;
  padding-bottom:6px; border-bottom:1px solid var(--line); letter-spacing:1px; }

/* yiji */
.yiji-line { display:flex; gap:10px; line-height:1.9; font-size:15px; }
.yiji-line .badge { display:inline-block; width:28px; height:28px; border-radius:50%; text-align:center;
  line-height:28px; font-size:14px; font-weight:bold; flex-shrink:0; }
.badge.yi { background:#e8f5e9; color:#2e7d32; }
.badge.ji { background:#fce4ec; color:#c62828; }
.shensha-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
.shen-tag { padding:3px 10px; border-radius:12px; font-size:13px; }
.shen-g { background:#f0f8e8; color:#558b2f; border:1px solid #c5e1a5; }
.shen-b { background:#fff0f0; color:#c0392b; border:1px solid #ef9a9a; }

/* info grid */
.info-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; font-size:14px; line-height:1.8; }
.info-grid .info-label { color:var(--muted); }
.info-grid .info-value { color:var(--ink); }

/* hour grid */
.hour-grid { display:grid; grid-template-columns:48px repeat(12,1fr); gap:1px;
  font-size:12px; text-align:center; background:var(--line); border-radius:8px; overflow:hidden; }
.hour-grid span { background:#fff; padding:6px 2px; }
.hour-grid .hour-label { grid-row:span 3; display:grid; place-items:center;
  background:#f5f0e8; font-size:11px; color:var(--muted); line-height:1.3; }
.hour-grid .hour-good { color:#2e7d32; font-weight:bold; }
.hour-grid .hour-bad { color:var(--muted); }

/* seo */
.seo-section { margin-top:14px; padding:14px; background:rgba(255,250,243,.68);
  border-radius:14px; font-size:13px; color:var(--muted); line-height:1.8; }

/* footer */
.site-footer { margin:14px 0; padding:10px; text-align:center; color:#7c756b; font-size:11px; line-height:1.65; }

/* bottom nav */
.bottom-nav {

  width:min(100vw,430px); height:82px; display:grid; grid-template-columns:repeat(4,1fr);

.nav-btn.active { color:var(--red); font-weight:700; opacity:1; }
.nav-ico { width:30px; height:30px; display:grid; place-items:center; color:currentColor; }
.nav-ico svg { width:30px; height:30px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.nav-ico .soft-fill { fill:currentColor; stroke:none; opacity:.12; }
.nav-ico .deep-fill { fill:currentColor; stroke:none; opacity:.24; }
.nav-ico .sun-fill { fill:currentColor; stroke:none; opacity:.78; }

<script>
var LM = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
var LD = ['','初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
var WN = ['日','一','二','三','四','五','六'];
var HEAVENLY_STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var EARTHLY_BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var FIRST_HOUR_STEM = { '甲':'甲','己':'甲','乙':'丙','庚':'丙','丙':'戊','辛':'戊','丁':'庚','壬':'庚','戊':'壬','癸':'壬' };
var DAY_BRANCH_GOOD_HOURS = {
  '子':['子','丑','卯','午','申','酉'], '丑':['寅','卯','巳','申','戌','亥'],
  '寅':['子','丑','辰','巳','未','戌'], '卯':['子','寅','卯','午','未','酉'],
  '辰':['寅','辰','巳','申','酉','亥'], '巳':['丑','辰','午','未','戌','亥'],
  '午':['子','丑','卯','午','申','酉'], '未':['寅','卯','巳','申','戌','亥'],
  '申':['子','丑','辰','巳','未','戌'], '酉':['子','寅','卯','午','未','酉'],
  '戌':['寅','辰','巳','申','酉','亥'], '亥':['丑','辰','午','未','戌','亥']
};

var currentDate = new Date();

function fmt2(n){return n<10?'0'+n:''+n}
function safeArr(a){return a&&a.length?a:[]}
function yijiText(list,fb){return (list&&list.length?list:[fb]).slice(0,12).join('　')}

function getInfo(y,m,d){
  try {
    var solar=Solar.fromYmd(y,m,d);
    var lunar=solar.getLunar();
    var lm=lunar.getMonth();
    return {
      date:new Date(y,m-1,d), solar:solar, lunar:lunar,
      lMonth:lm, lMonthName:(lm<0?'闰':'')+LM[Math.abs(lm)-1], lDay:lunar.getDay(), lDayName:LD[lunar.getDay()]||'',
      yGz:lunar.getYearInGanZhi?lunar.getYearInGanZhi():'',
      mGz:lunar.getMonthInGanZhi?lunar.getMonthInGanZhi():'',
      dGz:lunar.getDayInGanZhi?lunar.getDayInGanZhi():'',
      yi:safeArr(lunar.getDayYi?lunar.getDayYi():[]),
      ji:safeArr(lunar.getDayJi?lunar.getDayJi():[]),
      jiShen:safeArr(lunar.getDayJiShen?lunar.getDayJiShen():[]),
      xiongSha:safeArr(lunar.getDayXiongSha?lunar.getDayXiongSha():[]),
      chongSx:lunar.getDayChongShengXiao?lunar.getDayChongShengXiao():'',
      chongGan:lunar.getDayChongGan?lunar.getDayChongGan():'',
      chong:lunar.getDayChong?lunar.getDayChong():'',
      sha:lunar.getDaySha?lunar.getDaySha():'',
      zhiXing:lunar.getZhiXing?lunar.getZhiXing():'',
      naYin:lunar.getDayNaYin?lunar.getDayNaYin():'',
      taiShen:lunar.getDayPositionTai?lunar.getDayPositionTai():'',
      pengZuG:lunar.getPengZuGan?lunar.getPengZuGan():'',
      pengZuZ:lunar.getPengZuZhi?lunar.getPengZuZhi():''
    };
  } catch(e){
    return null;
  }
}

function render(){
  var d=currentDate;
  var info=getInfo(d.getFullYear(),d.getMonth()+1,d.getDate());
  if(!info)return;
  var el=function(id,text){var e=document.getElementById(id);if(e)e.textContent=text};
  el('dateText',d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日');
  el('lunarText',info.lDay===1?info.lMonthName+'月':info.lDayName);
  document.getElementById('ganzhiText').textContent=info.yGz+'年  '+info.mGz+'月  '+info.dGz+'日  周'+WN[d.getDay()];
  el('yiText',yijiText(info.yi,'平常事'));
  el('jiText',yijiText(info.ji,'无'));
  var gs=info.jiShen.length?info.jiShen:['无'];
  document.getElementById('jiShenTags').innerHTML=gs.map(function(s){return '<span class="shen-tag shen-g">'+s+'</span>'}).join('');
  var xs=info.xiongSha.length?info.xiongSha:['无'];
  document.getElementById('xiongShaTags').innerHTML=xs.map(function(s){return '<span class="shen-tag shen-b">'+s+'</span>'}).join('');
  el('naYin',info.naYin||'—');
  el('chongSha',(info.chongSx?'冲'+info.chongSx:'—')+(info.sha?' 煞'+info.sha:''));
  el('zhiShen',info.zhiXing||'—');
  el('taiShen',info.taiShen||'—');
  el('pengZu',(info.pengZuG||'—')+'  '+(info.pengZuZ||'—'));
  renderHourGrid(info);
}

function renderHourGrid(info){
  var grid=document.getElementById('hourGrid');
  if(!grid)return;
  var dg=(info.dGz||'甲子').charAt(0);
  var dz=(info.dGz||'甲子').charAt(1);
  var first=FIRST_HOUR_STEM[dg]||'甲';
  var si=HEAVENLY_STEMS.indexOf(first);
  var gh=DAY_BRANCH_GOOD_HOURS[dz]||DAY_BRANCH_GOOD_HOURS['子'];
  var stems=EARTHLY_BRANCHES.map(function(_,i){return HEAVENLY_STEMS[(si+i)%10]});
  grid.innerHTML='<div class="hour-label">时辰<br>宜忌</div>'+
    stems.map(function(s){return '<span>'+s+'</span>'}).join('')+
    EARTHLY_BRANCHES.map(function(b){return '<span>'+b+'</span>'}).join('')+
    EARTHLY_BRANCHES.map(function(b){
      var ok=gh.includes(b);
      return '<span class="'+(ok?'hour-good':'hour-bad')+'">'+(ok?'吉':'凶')+'</span>';
    }).join('');
}

function shiftDay(delta){
  currentDate.setDate(currentDate.getDate()+delta);
  render();
}

render();

</script>
