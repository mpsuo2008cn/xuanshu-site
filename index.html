<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f4efe4">
<title>我的万年历 · 玄枢</title>
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-startup-image" href="logo.png" media="(device-width: 375px) and (device-height: 812px)">
<style>
/* ============================================
   玄枢 — 东方岁时历书
   颜色系统：墨青 / 朱砂 / 淡金
   ============================================ */
:root {
  --paper: #f7f4ee;
  --paper2: #f0ece4;
  --ink-cyan: #203b3d;
  --ink-cyan-soft: #5a7d7f;
  --ink-cyan-ghost: rgba(32,59,61,0.06);
  --vermillion: #b34a3c;
  --vermillion-soft: #d49187;
  --vermillion-ghost: rgba(179,74,60,0.07);
  --gold: #b8955a;
  --gold-soft: #d4be8a;
  --gold-ghost: rgba(184,149,90,0.08);
  --text: #2c2c2c;
  --text-soft: #7a7570;
  --text-faint: #b5b0aa;
  --border: #e0dbd2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Serif SC",serif;
  background: var(--paper);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ============================================
   启动页 — 翻开一本东方历书
   ============================================ */
.splash {
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: var(--paper) url('bg-splash.png') no-repeat center center;
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(-10vh);
  transition: opacity 0.7s ease, visibility 0.7s ease;
}

/* 宣纸呼吸 — 极淡明暗脉动 */
.splash::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 45%, rgba(32,59,61,0.015) 0%, transparent 60%);
  animation: paperBreath 5s 0.5s ease-in-out both;
  pointer-events: none;
}

@keyframes paperBreath {
  0%   { opacity: 0; }
  40%  { opacity: 0.4; }
  70%  { opacity: 0.7; }
  100% { opacity: 1; }
}

.splash.hide {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.splash-inner {
  text-align: center;
  position: relative;
}

/* 星轨 — 似有若无 */
.splash-orbit {
  position: absolute;
  top: 50%; left: 50%;
  width: 280px; height: 280px;
  margin: -140px 0 0 -140px;
  border-radius: 50%;
  border: 0.5px solid rgba(184,149,90,0.12);
  animation: orbitBreathe 4s ease-in-out both;
  animation-delay: 1s;
  pointer-events: none;
  opacity: 0;
}
.splash-orbit::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 200px; height: 200px;
  margin: -100px 0 0 -100px;
  border-radius: 50%;
  border: 0.5px solid rgba(184,149,90,0.06);
}
.splash-orbit::after {
  content: '';
  position: absolute;
  top: -1.5px; left: 50%;
  width: 3px; height: 3px;
  margin-left: -1.5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: starBreathe 4s ease-in-out both;
  animation-delay: 1s;
}

/* 漂浮微尘 */
.splash-dust {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.splash-dust::before,
.splash-dust::after {
  content: '';
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
}

.splash-dust::before {
  top: 28%; left: 65%;
  animation: dustFloat1 8s 2s ease-in-out infinite;
}

.splash-dust::after {
  top: 55%; left: 32%;
  animation: dustFloat2 9s 2.5s ease-in-out infinite;
}

@keyframes dustFloat1 {
  0%   { opacity: 0;   transform: translate(0, 0); }
  15%  { opacity: 0.15; }
  45%  { opacity: 0.1;  transform: translate(-8px, -12px); }
  75%  { opacity: 0.05; }
  100% { opacity: 0;    transform: translate(4px, -20px); }
}

@keyframes dustFloat2 {
  0%   { opacity: 0;   transform: translate(0, 0); }
  20%  { opacity: 0.12; }
  50%  { opacity: 0.08; transform: translate(10px, -16px); }
  80%  { opacity: 0.03; }
  100% { opacity: 0;    transform: translate(-2px, -24px); }
}

@keyframes orbitBreathe {
  0%   { opacity: 0;    transform: scale(0.98); }
  20%  { opacity: 0.08; }
  55%  { opacity: 0.12; transform: scale(1.005); }
  80%  { opacity: 0.06; }
  100% { opacity: 0;    transform: scale(0.99); }
}

@keyframes starBreathe {
  0%   { opacity: 0; }
  25%  { opacity: 0.12; }
  55%  { opacity: 0.18; }
  80%  { opacity: 0.08; }
  100% { opacity: 0; }
}

/* Logo — 更大，更上 */
.splash-logo {
  width: 200px;
  height: 200px;
  border-radius: 40px;
  box-shadow: 0 4px 24px rgba(32,59,61,0.06);
  animation:
    logoFadeIn 1.4s ease both,
    logoBreath 6s 1.4s ease-in-out infinite;
  position: relative;
  z-index: 1;
  margin-bottom: 36px;
}

@keyframes logoFadeIn {
  0%   { opacity: 0;   transform: translateY(6px); }
  30%  { opacity: 0.15; }
  60%  { opacity: 0.5; }
  100% { opacity: 1;    transform: translateY(0); }
}

@keyframes logoBreath {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(0) scale(1.004); }
}

/* slogan — 竖排，居中，加大 */
.splash-tagline {
  font-size: 20px;
  color: var(--text-soft);
  letter-spacing: 6px;
  writing-mode: vertical-rl;
  margin: 0 auto 24px;
  line-height: 2;
  animation: tagFadeIn 1s 1.2s ease both;
}

@keyframes tagFadeIn {
  0%   { opacity: 0; transform: translateY(8px); }
  50%  { opacity: 0.3; }
  100% { opacity: 0.65; transform: translateY(0); }
}

/* 底部小字 — 加大，更清晰 */
.splash-sub {
  font-size: 15px;
  color: var(--text-soft);
  letter-spacing: 4px;
  opacity: 0;
  animation: subFadeIn 1s 2.2s ease both;
}

@keyframes subFadeIn {
  0%   { opacity: 0; }
  50%  { opacity: 0.35; }
  100% { opacity: 0.6; }
}

/* ============================================
   页面容器
   ============================================ */
.page {
  display: none;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}
.page.active {
  display: flex;
  opacity: 0;
}

/* ============================================
   首页 — 头部（岁时历书感）
   ============================================ */
.header {
  padding: 32px 24px 0;
  text-align: center;
}

.header-year {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 6px;
  margin-bottom: 10px;
}

.header-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
}

.header-month {
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 8px;
  min-width: 100px;
}

.nav-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-faint);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  opacity: 0.45;
}
.nav-dot:active {
  color: var(--ink-cyan);
  opacity: 0.8;
}

.header-today {
  display: inline-block;
  margin-top: 10px;
  padding: 3px 12px;
  border: none;
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 3px;
  background: transparent;
  cursor: pointer;
  transition: all 0.25s;
}
.header-today:active {
  color: var(--ink-cyan);
}

/* ============================================
   日历网格 — 压缩，轻盈
   ============================================ */
.calendar-wrap {
  padding: 8px 20px 2px;
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 0;
}
.weekdays span {
  text-align: center;
  font-size: 9px;
  color: var(--text-faint);
  padding: 4px 0;
  letter-spacing: 2px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0;
}

.day-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  min-height: 30px;
}
.day-cell:active {
  background: var(--paper2);
}
.day-cell.empty {
  cursor: default;
}
.day-cell.today {
  background: rgba(32,59,61,0.18);
  box-shadow: inset 0 0 0 1px rgba(32,59,61,0.25);
}
.day-cell.selected {
  box-shadow: inset 0 0 0 1.5px var(--vermillion);
}

.day-cell .solar {
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.1;
}
.day-cell.today .solar {
  color: var(--ink-cyan);
  font-weight: 500;
}
.day-cell.other-month .solar {
  color: var(--text-faint);
}

.day-cell .sub {
  font-size: 8px;
  line-height: 1.1;
  margin-top: 0;
}
.day-cell .sub.lunar {
  color: var(--text-faint);
}
.day-cell .sub.jieqi {
  color: var(--gold-soft);
  font-weight: 500;
}
.day-cell .sub.festival {
  color: var(--vermillion-soft);
}
.day-cell.today .sub {
  color: var(--ink-cyan-soft);
}
.day-cell.other-month .sub {
  opacity: 0;
}

.festival-dot {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--vermillion);
  opacity: 0.5;
}

/* ============================================
   首页 — 今日卡片（纸上的一页纸）
   ============================================ */
.today-summary {
  margin: 12px 24px 16px;
  padding: 24px 20px 20px;
  border: 0.5px solid rgba(180,175,165,0.35);
  border-radius: 16px;
  background:
    radial-gradient(ellipse 80% 40% at 20% 90%, rgba(150,180,160,0.03) 0%, transparent 50%),
    radial-gradient(ellipse 60% 30% at 85% 80%, rgba(180,160,150,0.02) 0%, transparent 50%),
    rgba(255,255,255,0.35);
  box-shadow: 0 1px 4px rgba(32,59,61,0.03), 0 2px 12px rgba(32,59,61,0.02);
  text-align: center;
  position: relative;
  overflow: hidden;
}

/* 极淡植物装饰 — 岁时气氛 */
.today-summary::before {
  content: '';
  position: absolute;
  bottom: 0;
  right: 0;
  width: 120px;
  height: 100px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(100,140,120,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 80% 60%, rgba(120,150,130,0.03) 0%, transparent 60%);
  pointer-events: none;
}

.today-summary .lunar-big {
  font-size: 36px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 4px;
  margin-bottom: 8px;
  line-height: 1.2;
}

.today-summary .solar-info {
  font-size: 12px;
  color: var(--text-faint);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.today-summary .ganzhi-line {
  font-size: 13px;
  color: var(--ink-cyan-soft);
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.today-summary .jieqi-fest {
  margin-bottom: 4px;
}
.today-summary .jieqi-fest span {
  display: inline-block;
  padding: 2px 10px;
  font-size: 12px;
  letter-spacing: 2px;
}
.jf-gold { color: var(--gold); }
.jf-red  { color: var(--vermillion-soft); }

/* 首页不展示宜忌 */
.yiji-section, .yi-list, .ji-list, .yi-tag, .ji-tag, .yiji-label {
  display: none;
}

/* 查看详情 — 极简文字链接 */
.detail-link {
  display: block;
  text-align: center;
  margin: 8px auto 0;
  padding: 8px;
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 3px;
  cursor: pointer;
  background: transparent;
  border: none;
  transition: all 0.25s;
  text-decoration: none;
}
.detail-link::before,
.detail-link::after {
  content: '';
  display: inline-block;
  width: 24px;
  height: 1px;
  background: var(--border);
  vertical-align: middle;
  margin: 0 8px;
  opacity: 0.5;
}
.detail-link:active {
  color: var(--ink-cyan);
}

/* 首页 — 纯净纸面背景 */
.page#pageHome {
  position: relative;
  background: var(--paper);
}
.page#pageHome::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30vh;
  background:
    radial-gradient(ellipse 160% 30% at 50% 120%, rgba(32,59,61,0.008) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================
   详情页 — 古籍书页
   ============================================ */
.detail-header {
  display: flex;
  align-items: center;
  padding: 16px 20px 4px;
}

.back-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-faint);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0.5;
}
.back-btn:active {
  opacity: 0.9;
  color: var(--ink-cyan);
}

.detail-title {
  flex: 1;
  text-align: center;
  font-size: 13px;
  color: var(--text-faint);
  letter-spacing: 4px;
  padding-right: 28px;
}

.detail-content {
  padding: 16px 28px 60px;
}

/* 详情页背景 */
.page#pageDetail {
  background: var(--paper) url('bg-detail.png') no-repeat center bottom;
  background-size: 100% auto;
}

/* ── 书页结构：极细线分隔，无卡片 ── */
.book-line {
  height: 0.5px;
  background: var(--border);
  margin: 20px 0;
  opacity: 0.5;
}

.book-section {
  margin-bottom: 18px;
}

.book-label {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 5px;
  margin-bottom: 10px;
  opacity: 0.7;
}

.book-text {
  font-size: 14px;
  color: var(--text-soft);
  line-height: 1.9;
  letter-spacing: 1px;
}

/* 古籍书名式大标题 */
.book-title-date {
  text-align: center;
  padding: 8px 0 14px;
}
.book-title-date .bt-lunar {
  font-size: 30px;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.book-title-date .bt-ganzhi {
  font-size: 13px;
  color: var(--ink-cyan-soft);
  letter-spacing: 3px;
  margin-bottom: 2px;
}
.book-title-date .bt-solar {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 2px;
}

/* 节气物候 — 如正文岁时信息 */
.book-jieqi {
  text-align: center;
  font-size: 12px;
  color: var(--gold-soft);
  letter-spacing: 2px;
  padding: 6px 0;
  opacity: 0.7;
}

/* 宜忌 — 古籍排版：左右对称 */
.yiji-book {
  display: flex;
  gap: 24px;
  padding: 4px 0;
}
.yiji-col {
  flex: 1;
  text-align: center;
}
.yiji-col .yj-head {
  font-size: 14px;
  letter-spacing: 6px;
  margin-bottom: 14px;
}
.yiji-col.yi .yj-head { color: var(--ink-cyan-soft); }
.yiji-col.ji .yj-head { color: var(--vermillion-soft); }
.yiji-col .yj-item {
  font-size: 13px;
  line-height: 2.2;
  letter-spacing: 1px;
}
.yiji-col.yi .yj-item { color: var(--ink-cyan); }
.yiji-col.ji .yj-item { color: var(--text-faint); }

/* 黄历详情 — 像古书注释 */
.book-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
}
.book-grid .bg-cell {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.8;
  letter-spacing: 1px;
}
.bg-cell .bg-k {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 2px;
  margin-right: 6px;
}

/* 长行项目 */
.book-row {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 2;
  letter-spacing: 1px;
  padding: 4px 0;
}
.book-row .br-label {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 2px;
  display: block;
  margin-bottom: 2px;
}

/* 神煞列表 — 无标签纯文字 */
.shen-list {
  color: var(--gold-soft);
}
.sha-list {
  color: var(--text-faint);
}

/* 更多黄历信息 — 收起/展开 */
.more-toggle {
  text-align: center;
  padding: 6px 0;
  cursor: pointer;
}
.more-arrow {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 3px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.more-toggle:active .more-arrow {
  opacity: 0.9;
  color: var(--ink-cyan);
}

/* 旧卡片样式 — 不再使用 */
.info-card, .info-card-title, .info-card-body, .card-tag { display: none; }

/* ============================================
   底部
   ============================================ */
.footer {
  text-align: center;
  padding: 16px 16px 24px;
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 3px;
  opacity: 0.4;
}
.page#pageHome .footer {
  display: none;
}

/* ============================================
   响应式
   ============================================ */
@media (min-width: 480px) {
  .calendar-wrap { padding: 20px 40px 6px; }
  .today-summary { margin: 24px 60px 0; }
  .detail-link { margin: 12px auto 0; }
  .detail-content { padding: 8px 32px 40px; }
  .day-cell .solar { font-size: 17px; }
  .today-summary .lunar-big { font-size: 44px; }
}

/* ============================================
   2026 redesign — 更清晰的移动端黄历工具
   ============================================ */
:root {
  --paper: #f4efe4;
  --paper2: #ebe2d2;
  --surface: rgba(255,255,255,0.64);
  --surface-strong: rgba(255,255,255,0.84);
  --ink-cyan: #173f42;
  --ink-cyan-soft: #527173;
  --ink-cyan-ghost: rgba(23,63,66,0.09);
  --vermillion: #a93f33;
  --vermillion-soft: #c56a5f;
  --vermillion-ghost: rgba(169,63,51,0.1);
  --gold: #9f7c3d;
  --gold-soft: #bc9a5c;
  --gold-ghost: rgba(159,124,61,0.12);
  --text: #22201d;
  --text-soft: #736c62;
  --text-faint: #aaa195;
  --border: rgba(48,42,34,0.1);
  --shadow: 0 18px 60px rgba(42,35,24,0.11);
}

body {
  font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
  background:
    linear-gradient(180deg, rgba(244,239,228,0.42), var(--paper) 48%),
    url('bg-main.png') no-repeat center top / cover fixed;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(23,63,66,0.045), transparent 18%, transparent 82%, rgba(169,63,51,0.035)),
    radial-gradient(circle at 20% 10%, rgba(159,124,61,0.11), transparent 26%);
  pointer-events: none;
}

.splash {
  transform: none;
  align-items: flex-start;
  padding-top: 24vh;
  background:
    linear-gradient(180deg, rgba(244,239,228,0.22), rgba(244,239,228,0.9)),
    url('bg-splash.png') no-repeat center center / cover;
  transition: opacity 1.05s ease, visibility 1.05s ease;
}

.splash-logo {
  width: 152px;
  height: 152px;
  border-radius: 32px;
  box-shadow: 0 24px 70px rgba(38,31,22,0.18);
  margin-bottom: 52px;
}

.splash-tagline {
  writing-mode: vertical-rl;
  text-orientation: upright;
  font-size: 19px;
  line-height: 1.9;
  letter-spacing: 5px;
  color: var(--ink-cyan);
  margin: 0 auto;
  text-align: center;
}

.page {
  width: min(100%, 520px);
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.page.active {
  opacity: 1;
}

.page#pageHome,
.page#pageDetail {
  background: transparent;
}

.page#pageHome::after {
  display: none;
}

.header {
  padding: max(22px, env(safe-area-inset-top)) 22px 12px;
  text-align: left;
}

.header::before {
  content: '玄枢';
  display: block;
  font-size: 12px;
  color: var(--gold);
  letter-spacing: 8px;
  margin-bottom: 16px;
}

.header-year {
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--text-soft);
  margin-bottom: 4px;
}

.header-row {
  justify-content: space-between;
  gap: 12px;
}

.header-month {
  min-width: auto;
  flex: 1;
  font-size: clamp(34px, 11vw, 56px);
  line-height: 1;
  letter-spacing: 1px;
  font-weight: 700;
  color: var(--text);
}

.nav-dot {
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: var(--surface-strong);
  border: 1px solid var(--border);
  color: var(--ink-cyan);
  font-size: 22px;
  opacity: 1;
  box-shadow: 0 8px 26px rgba(42,35,24,0.08);
}

.nav-dot:active {
  transform: scale(0.96);
  background: var(--ink-cyan);
  color: #fffaf1;
}

.header-today {
  margin-top: 14px;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.54);
  color: var(--ink-cyan);
  font-size: 12px;
  letter-spacing: 2px;
}

.calendar-wrap {
  margin: 0 16px;
  padding: 14px 12px 16px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.weekdays {
  padding: 0 2px 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}

.weekdays span {
  font-size: 11px;
  letter-spacing: 0;
  color: var(--text-soft);
}

.cal-grid {
  gap: 4px;
}

.day-cell {
  border-radius: 8px;
  min-height: 44px;
  background: transparent;
  border: 1px solid transparent;
}

.day-cell:active {
  background: rgba(255,255,255,0.75);
}

.day-cell.today {
  background: var(--ink-cyan);
  box-shadow: none;
}

.day-cell.selected {
  border-color: var(--vermillion);
  background: var(--vermillion-ghost);
  box-shadow: none;
}

.day-cell.today.selected {
  background: var(--ink-cyan);
  border-color: var(--gold-soft);
}

.day-cell .solar {
  font-size: 15px;
  font-weight: 700;
}

.day-cell .sub {
  max-width: 100%;
  padding: 0 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 9px;
  margin-top: 2px;
}

.day-cell.today .solar,
.day-cell.today .sub {
  color: #fffaf1;
}

.festival-dot {
  top: 5px;
  right: 6px;
  width: 4px;
  height: 4px;
}

.today-summary {
  margin: 16px 16px 12px;
  padding: 22px;
  text-align: left;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.64);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,255,255,0.58)),
    radial-gradient(circle at 88% 10%, rgba(169,63,51,0.1), transparent 28%);
  box-shadow: var(--shadow);
}

.today-summary::before {
  inset: auto 16px 16px auto;
  width: 72px;
  height: 72px;
  border: 1px solid var(--gold-ghost);
  border-radius: 999px;
  background: transparent;
}

.summary-kicker {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 12px;
  color: var(--text-soft);
  font-size: 12px;
  letter-spacing: 2px;
}

.summary-pill {
  color: var(--vermillion);
  background: var(--vermillion-ghost);
  border-radius: 999px;
  padding: 5px 10px;
  letter-spacing: 1px;
  white-space: nowrap;
}

.today-summary .lunar-big {
  font-size: clamp(34px, 10vw, 48px);
  font-weight: 800;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.today-summary .solar-info,
.today-summary .ganzhi-line {
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.summary-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 16px;
}

.summary-meta span,
.summary-yiji span,
.book-grid .bg-cell,
.book-row {
  border-radius: 8px;
  background: rgba(244,239,228,0.66);
  border: 1px solid var(--border);
}

.summary-meta span {
  padding: 9px 10px;
  font-size: 12px;
  color: var(--text-soft);
}

.summary-yiji {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}

.summary-yiji span {
  padding: 10px;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-soft);
}

.summary-yiji b {
  display: block;
  font-size: 12px;
  margin-bottom: 4px;
  color: var(--ink-cyan);
}

.summary-yiji .ji b {
  color: var(--vermillion);
}

.detail-link {
  width: calc(100% - 32px);
  margin: 0 16px 24px;
  padding: 14px 16px;
  border-radius: 8px;
  background: var(--ink-cyan);
  color: #fffaf1;
  font-size: 13px;
  letter-spacing: 2px;
  box-shadow: 0 12px 32px rgba(23,63,66,0.18);
}

.detail-link::before,
.detail-link::after {
  display: none;
}

.detail-header {
  position: sticky;
  top: 0;
  z-index: 5;
  padding: max(12px, env(safe-area-inset-top)) 16px 10px;
  background: rgba(244,239,228,0.82);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}

.back-btn {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  background: var(--surface-strong);
  border: 1px solid var(--border);
  color: var(--ink-cyan);
  font-size: 20px;
  opacity: 1;
}

.detail-title {
  padding-right: 40px;
  font-size: 14px;
  color: var(--text);
  letter-spacing: 3px;
  font-weight: 700;
}

.detail-content {
  padding: 18px 16px 56px;
}

.book-title-date,
.book-section,
.yiji-book,
.more-toggle,
.more-content {
  border-radius: 8px;
  background: rgba(255,255,255,0.68);
  border: 1px solid var(--border);
  box-shadow: 0 12px 42px rgba(42,35,24,0.08);
}

.book-title-date {
  padding: 22px 18px;
}

.book-title-date .bt-lunar {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: 1px;
}

.book-line {
  display: none;
}

.book-section {
  margin: 12px 0;
  padding: 16px;
}

.book-label {
  margin-bottom: 12px;
  letter-spacing: 3px;
  color: var(--gold);
  opacity: 1;
}

.book-grid {
  gap: 8px;
}

.book-grid .bg-cell,
.book-row {
  padding: 10px;
  font-size: 12px;
  line-height: 1.7;
}

.bg-cell .bg-k {
  display: block;
  margin: 0 0 4px;
  letter-spacing: 1px;
  color: var(--gold);
}

.book-jieqi {
  margin: 12px 0;
  border-radius: 8px;
  background: var(--gold-ghost);
  color: var(--gold);
  padding: 10px;
  opacity: 1;
}

.yiji-book {
  gap: 10px;
  padding: 12px;
  margin: 12px 0;
}

.yiji-col {
  padding: 12px 8px;
  border-radius: 8px;
  background: rgba(244,239,228,0.62);
}

.yiji-col .yj-head {
  font-weight: 800;
  letter-spacing: 4px;
}

.yiji-col .yj-item {
  line-height: 1.9;
}

.more-toggle {
  margin: 12px 0;
  padding: 14px 0;
  background: var(--surface-strong);
}

.more-content {
  padding: 4px 12px;
  background: rgba(255,255,255,0.48);
}

.more-content .book-section {
  box-shadow: none;
  background: transparent;
}

.footer {
  display: none;
}

@media (max-width: 360px) {
  .header { padding-left: 14px; padding-right: 14px; }
  .calendar-wrap,
  .today-summary,
  .detail-link { margin-left: 10px; margin-right: 10px; width: auto; }
  .day-cell { min-height: 40px; }
  .day-cell .solar { font-size: 14px; }
  .day-cell .sub { font-size: 8px; }
  .summary-meta,
  .summary-yiji,
  .book-grid { grid-template-columns: 1fr; }
}

function showPage(id) {
  var pages = { home: $pageHome, calendar: $pageCalendar, detail: $pageDetail, zeri: $pageZeri, mine: $pageMine };
  for (var key in pages) {
    if (pages[key]) pages[key].classList.toggle('active', key === id);
  }
  for (var i = 0; i < $tabs.length; i++) {
    $tabs[i].classList.toggle('active', $tabs[i].dataset.page === id);
  }
  document.body.classList.toggle('detail-mode', id === 'detail');
  if (id === 'detail') {
    renderDetailPage();
  }
  if (id === 'mine') {
    renderFavorites();
  }
  if (id === 'zeri') {
    initZeri();
  }
  window.scrollTo({ top: 0, behavior: 'auto' });
}

  $tabs[ti].addEventListener('click', function() {
    showPage(this.dataset.page);
  });

document.addEventListener('click', function(e) {
  var actionBtn = e.target.closest('[data-action]');
  if (actionBtn) {
    var action = actionBtn.getAttribute('data-action');
    if (action === 'favorite') toggleFavorite();
    if (action === 'share') shareSelectedDay();
    return;
  }

  var favoriteBtn = e.target.closest('[data-favorite-key]');
  if (favoriteBtn) {
    var item = favorites[favoriteBtn.getAttribute('data-favorite-key')];
    if (!item) return;
    state.year = item.year;
    state.month = item.month;
    state.selectedDay = { year: item.year, month: item.month, day: item.day };
    renderCalendar();
    renderSummary();
    applySeason();
    showPage('detail');
    return;
  }

  var mineBtn = e.target.closest('[data-mine-action]');
  if (mineBtn) {
    handleMineAction(mineBtn.getAttribute('data-mine-action'));
  }
});

      lMonth: lunar.getMonth(),
      lDay: lunar.getDay(),
      lMonthName: (lunar.getMonth() < 0 ? '闰' : '') + LM[Math.abs(lunar.getMonth()) - 1],
      lDayName: LD[lunar.getDay()],
      isLeap: lunar.getMonth() < 0,
      yGz: lunar.getYearInGanZhi(),
      mGz: lunar.getMonthInGanZhi(),
      dGz: lunar.getDayInGanZhi(),
      jieQi: lunar.getJieQi() || '',
      festivals: lunar.getFestivals ? lunar.getFestivals() : [],
      solarFestivals: solar.getFestivals ? solar.getFestivals() : [],
      yi: lunar.getDayYi ? lunar.getDayYi() : [],
      ji: lunar.getDayJi ? lunar.getDayJi() : [],
      chongSx: lunar.getDayChongShengXiao ? lunar.getDayChongShengXiao() : '',
      chongGz: lunar.getDayChongGan ? (lunar.getDayChongGan() + lunar.getDayChong()) : '',
      sha: lunar.getDaySha ? lunar.getDaySha() : '',
      zhiXing: lunar.getZhiXing ? lunar.getZhiXing() : '',
      xiu: lunar.getXiu ? lunar.getXiu() : '',
      naYin: lunar.getDayNaYin ? lunar.getDayNaYin() : '',
      pengZuG: lunar.getPengZuGan ? lunar.getPengZuGan() : '',
      pengZuZ: lunar.getPengZuZhi ? lunar.getPengZuZhi() : '',
      jiShen: lunar.getDayJiShen ? lunar.getDayJiShen() : [],
      xiongSha: lunar.getDayXiongSha ? lunar.getDayXiongSha() : [],
      liuYao: lunar.getLiuYao ? lunar.getLiuYao() : '',
      jiuXing: lunar.getDayNineStar ? lunar.getDayNineStar() : null,
      posXi: lunar.getPositionXi ? lunar.getPositionXi() : '',
      posFu: lunar.getPositionFu ? lunar.getPositionFu() : '',
      posCai: lunar.getPositionCai ? lunar.getPositionCai() : '',
      taiShen: lunar.getDayPositionTai ? lunar.getDayPositionTai() : '',
      yueXiang: lunar.getYueXiang ? lunar.getYueXiang() : '',
      wuHou: lunar.getWuHou ? lunar.getWuHou() : '',
      fu: lunar.getFu ? lunar.getFu() : null,
      shuJiu: lunar.getShuJiu ? lunar.getShuJiu() : null
    };
  } catch(e) {
    return null;
  }
}

/* ============================================
   渲染日历
   ============================================ */
function renderCalendar() {
  // 头部
  $headerMonth.textContent = pad2(state.month) + '月';
  $headerYear.textContent = state.year;

  var fd = new Date(state.year, state.month - 1, 1).getDay();
  var dim = new Date(state.year, state.month, 0).getDate();
  var pdim = new Date(state.year, state.month - 1, 0).getDate();

  var now = new Date();
  var isCurM = state.year === now.getFullYear() && state.month === now.getMonth() + 1;

  var h = '';

  // 上月填充
  for (var i = fd - 1; i >= 0; i--) {
    h += '<div class="day-cell empty other-month"><div class="solar">' + (pdim - i) + '</div><div class="sub"></div></div>';
  }

  // 当月
  for (var d = 1; d <= dim; d++) {
    var isToday = isCurM && d === now.getDate();
    var isSel = state.selectedDay && state.selectedDay.year === state.year && state.selectedDay.month === state.month && state.selectedDay.day === d;

    var cls = 'day-cell';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';

    var subText = '', subCls = 'sub lunar';
    try {
      var sol = Solar.fromYmd(state.year, state.month, d);
      var lun = sol.getLunar();
      var jq = lun.getJieQi() || '';
      var lf = lun.getFestivals ? lun.getFestivals() : [];
      var sf = sol.getFestivals ? sol.getFestivals() : [];

      if (jq) {
        subText = jq;
        subCls = 'sub jieqi';
        cls += ' has-jieqi';
      } else if (lf.length > 0) {
        subText = lf[0];
        subCls = 'sub festival';
      } else if (lun.getDay() === 1) {
        var lm = lun.getMonth();
        subText = (lm < 0 ? '闰' : '') + LM[Math.abs(lm) - 1] + '月';
      } else {
        subText = LD[lun.getDay()] || '';
      }

      h += '<div class="' + cls + '" data-day="' + d + '">';
      h += '<div class="solar">' + d + '</div>';
      h += '<div class="' + subCls + '">' + subText + '</div>';
      if (lf.length || sf.length) h += '<div class="festival-dot"></div>';
      h += '</div>';
    } catch(e) {
      h += '<div class="' + cls + '" data-day="' + d + '"><div class="solar">' + d + '</div><div class="sub lunar"></div></div>';
    }
  }

  // 下月填充
  var total = fd + dim;
  var rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (var j = 1; j <= rem; j++) {
    h += '<div class="day-cell empty other-month"><div class="solar">' + j + '</div><div class="sub"></div></div>';
  }

  $calGrid.innerHTML = h;

  // 绑定点击
  var cells = $calGrid.querySelectorAll('.day-cell:not(.empty)');
  for (var k = 0; k < cells.length; k++) {
    cells[k].addEventListener('click', function() {
      selectDay(parseInt(this.dataset.day));
    });
  }
}

function selectDay(day) {
  state.selectedDay = { year: state.year, month: state.month, day: day };
  renderCalendar();
  renderSummary();
  applySeason();
}

function pad2(n) {
  return n < 10 ? '0' + n : '' + n;
}

function safeList(value) {
  if (Array.isArray(value)) return value.filter(Boolean);
  if (!value) return [];
  return String(value).split(/[ ,，、]/).filter(Boolean);
}

function hasTerm(list, terms) {
  var text = safeList(list).join('');
  return terms.some(function(term) { return text.indexOf(term) >= 0; });
}

function initZeri() {
  if (!zeriReady) {
    var activity = document.getElementById('zeriActivity');
    var bride = document.getElementById('zeriBride');
    if (activity) {
      activity.innerHTML = ZERI_ACTIVITIES.map(function(item) {
        return '<option value="' + item.id + '">' + item.name + '</option>';
      }).join('');
    }
    if (bride) {
      bride.innerHTML = ZERI_ZODIACS.map(function(z) {
        return '<option value="' + z + '">' + z + '</option>';
      }).join('');
      var sx = getInfo(state.selectedDay.year, state.selectedDay.month, state.selectedDay.day);
      if (sx && sx.lunar && ZERI_ZODIACS.indexOf(sx.lunar.getYearShengXiao()) >= 0) {
        bride.value = sx.lunar.getYearShengXiao();
      }
    }
    document.querySelectorAll('.zeri-tab').forEach(function(btn) {
      btn.addEventListener('click', function() { showZeriTab(btn.dataset.zeriTab); });
    });
    document.getElementById('zeriChooseBtn').addEventListener('click', renderZeriChoose);
    document.getElementById('zeriMarriageBtn').addEventListener('click', renderZeriMarriage);
    document.getElementById('zeriBride').addEventListener('change', function() {
      renderZeriRule();
      renderZeriMarriage();
    });
    document.getElementById('zeriMarriageRange').addEventListener('change', renderZeriMarriage);
    document.getElementById('zeriTodayCard').addEventListener('click', function(e) {
      if (e.target.closest('.zeri-score')) openFortuneModal();
    });
    if ($fortuneClose) $fortuneClose.addEventListener('click', closeFortuneModal);
    if ($fortuneModal) $fortuneModal.addEventListener('click', function(e) {
      if (e.target === $fortuneModal) closeFortuneModal();
    });
    zeriReady = true;
  }
  renderZeriToday();
  renderZeriRule();
  renderZeriChoose();
  renderZeriMarriage();
}

function showZeriTab(tab) {
  document.querySelectorAll('.zeri-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.zeriTab === tab);
  });
  document.querySelectorAll('.zeri-section').forEach(function(sec) {
    sec.classList.toggle('active', sec.id === 'zeri' + tab.charAt(0).toUpperCase() + tab.slice(1));
  });
}

function zeriDay(date) {
  var info = getInfo(date.getFullYear(), date.getMonth() + 1, date.getDate());
  var lunar = info.lunar;
  var luckyHours = [
    { name: '子时', h: 23 }, { name: '丑时', h: 1 }, { name: '寅时', h: 3 },
    { name: '卯时', h: 5 }, { name: '辰时', h: 7 }, { name: '巳时', h: 9 },
    { name: '午时', h: 11 }, { name: '未时', h: 13 }, { name: '申时', h: 15 },
    { name: '酉时', h: 17 }, { name: '戌时', h: 19 }, { name: '亥时', h: 21 }
  ].map(function(item) {
    var l = Solar.fromYmdHms(date.getFullYear(), date.getMonth() + 1, date.getDate(), item.h, 0, 0).getLunar();
    return { name: item.name, tian: l.getTimeTianShen ? l.getTimeTianShen() : '', luck: l.getTimeTianShenLuck ? l.getTimeTianShenLuck() : '' };
  }).filter(function(item) { return item.luck === '吉'; }).slice(0, 4);
  return {
    date: date,
    info: info,
    solarText: date.getFullYear() + '年' + pad2(date.getMonth() + 1) + '月' + pad2(date.getDate()) + '日',
    title: (info.jieQi ? info.jieQi + ' · ' : '') + info.lMonthName + '月' + info.lDayName,
    lunarMonth: Math.abs(info.lMonth),
    yi: safeList(info.yi),
    ji: safeList(info.ji),
    chong: info.chongSx,
    sha: info.sha,
    tian: lunar.getDayTianShen ? lunar.getDayTianShen() : '',
    luck: lunar.getDayTianShenLuck ? lunar.getDayTianShenLuck() : '',
    luckyHours: luckyHours
  };
}

function zeriScore(day) {
  var score = 64;
  if (day.luck === '吉') score += 12;
  if (day.luck === '凶') score -= 10;
  score += Math.min(12, day.yi.length * 2);
  score -= Math.min(14, day.ji.length);
  if (hasTerm(day.yi, ['嫁娶', '开市', '入宅', '出行', '祈福'])) score += 6;
  return Math.max(35, Math.min(96, score));
}

function renderZeriToday() {
  var day = zeriDay(new Date());
  var score = zeriScore(day);
  document.getElementById('zeriTodayCard').innerHTML =
    '<div class="zeri-date">' + day.solarText + '　星期' + WN[day.date.getDay()] + '</div>' +
    '<h2 class="zeri-title">' + day.title + '</h2>' +
    '<div class="zeri-line">' + day.info.yGz + '年　' + day.info.mGz + '月　' + day.info.dGz + '日</div>' +
    '<button class="zeri-score" type="button" aria-label="查看今日运势详解"><div><strong>' + score + '</strong><span>今日运势</span></div></button>' +
    '<div class="zeri-line">' + (score >= 82 ? '气势明朗' : score >= 68 ? '稳中有利' : '宜守宜缓') + ' · ' + day.tian + day.luck + '</div>' +
    '<div class="zeri-grid">' +
      zeriBox('宜', day.yi.slice(0, 8).join('　') || '平常事') +
      zeriBox('忌', day.ji.slice(0, 8).join('　') || '无') +
      zeriBox('冲煞', '冲' + day.chong + '　' + day.sha) +
      zeriBox('玉匣参考', '宿：' + day.info.xiu + '<br>值：' + day.info.zhiXing + '<br>胎神：' + day.info.taiShen) +
    '</div>';
  document.getElementById('zeriTodayMore').innerHTML =
    '<h3 class="zeri-subtitle">每日一签</h3>' +
    '<p class="zeri-text">' + dailyQuote(day) + '</p>' +
    '<h3 class="zeri-subtitle" style="margin-top:14px">今日吉时</h3>' +
    '<div class="zeri-hour-row">' + day.luckyHours.map(function(h) { return '<span>' + h.name + '<em>' + h.tian + '</em></span>'; }).join('') + '</div>' +
    '<h3 class="zeri-subtitle" style="margin-top:14px">生肖提醒</h3>' +
    '<p class="zeri-text">今日冲' + day.chong + '，属' + day.chong + '者大事宜缓；重要事项仍以具体宜忌和冲煞为准。</p>';
}

function openFortuneModal() {
  var day = zeriDay(new Date());
  var score = zeriScore(day);
  var level = score >= 82 ? '气势明朗' : score >= 68 ? '稳中有利' : score >= 55 ? '宜守宜缓' : '凡事从简';
  var parts = fortuneParts(day, score);
  $fortuneBody.innerHTML =
    '<div class="fortune-summary"><strong>' + score + '</strong><span>' + level + '</span></div>' +
    '<p class="zeri-text">今日总评：' + fortuneSummary(score) + '</p>' +
    '<div class="fortune-grid">' + parts.map(function(item) {
      return '<div class="fortune-item"><span>' + item.name + '</span><strong>' + item.value + '</strong><em>' + item.text + '</em></div>';
    }).join('') + '</div>' +
    '<div class="zeri-panel" style="box-shadow:none;margin-bottom:10px"><h3 class="zeri-subtitle">今日适合做什么</h3><p class="zeri-text">' + (day.yi.slice(0, 10).join('　') || '整理、准备、收尾') + '</p></div>' +
    '<div class="zeri-panel" style="box-shadow:none;margin-bottom:10px"><h3 class="zeri-subtitle">今日不宜做什么</h3><p class="zeri-text">' + (day.ji.slice(0, 10).join('　') || '无明显忌项，仍以稳妥为宜') + '</p></div>' +
    '<div class="zeri-panel" style="box-shadow:none"><h3 class="zeri-subtitle">今日提醒</h3><p class="zeri-text">' + dailyQuote(day) + '<br>今日冲' + day.chong + '，属' + day.chong + '者重要事项宜缓。</p></div>';
  $fortuneModal.classList.add('show');
}

function closeFortuneModal() {
  $fortuneModal.classList.remove('show');
}

function fortuneSummary(score) {
  if (score >= 82) return '适合安排重要事项，但仍要避开今日所冲生肖和黄历忌项。';
  if (score >= 68) return '可推进日常计划，重大事项宜再结合具体事项细看。';
  if (score >= 55) return '宜稳不宜急，适合准备、整理、沟通与收尾。';
  return '今日以少动多守为佳，重要决定不必急于一时。';
}

function fortuneParts(day, score) {
  return [
    fortuneItem('财运', score + (hasTerm(day.yi, ['纳财', '交易']) ? 5 : -3), '重在稳妥，不宜贪快'),
    fortuneItem('事业', score + (hasTerm(day.yi, ['开市', '交易', '立券']) ? 4 : -2), '宜定计划与推进事务'),
    fortuneItem('感情', score + (hasTerm(day.yi, ['嫁娶', '会亲友']) ? 6 : -1), '适合沟通与修和'),
    fortuneItem('出行', score + (hasTerm(day.yi, ['出行']) ? 6 : -4), '远行先看冲煞方位'),
    fortuneItem('健康', score + (day.ji.length > 8 ? -5 : 1), '饮食作息宜清简')
  ];
}

function fortuneItem(name, value, text) {
  return { name: name, value: Math.max(35, Math.min(96, value)), text: text };
}

function dailyQuote(day) {
  var quotes = [
    '今日宜静中取势。',
    '凡事先定心，后定事。',
    '顺其时而行，少费力而多成。',
    '缓一步看清，稳一分得势。',
    '心不乱，则事有序。',
    '小事从容，大事有度。'
  ];
  var seed = day.date.getFullYear() + day.date.getMonth() + day.date.getDate();
  return quotes[seed % quotes.length];
}

function zeriBox(label, text) {
  return '<div class="zeri-box"><label>' + label + '</label><div>' + text + '</div></div>';
}

function scanZeri(days) {
  var out = [];
  var start = new Date();
  start = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  for (var i = 0; i < days; i++) {
    var d = new Date(start.getTime());
    d.setDate(start.getDate() + i);
    out.push(zeriDay(d));
  }
  return out;
}

function renderZeriChoose() {
  var sel = document.getElementById('zeriActivity');
  if (!sel) return;
  var activity = ZERI_ACTIVITIES.find(function(item) { return item.id === sel.value; }) || ZERI_ACTIVITIES[0];
  var days = Number(document.getElementById('zeriRange').value || 60);
  var results = scanZeri(days).filter(function(day) {
    return hasTerm(day.yi, activity.terms) && !hasTerm(day.ji, activity.terms);
  }).slice(0, 12);
  document.getElementById('zeriChooseResults').innerHTML = results.length ? results.map(function(day) {
    return zeriDayCard(day, [zeriBadge('宜' + activity.name), zeriBadge(day.tian + day.luck, day.luck === '吉' ? '' : 'gold'), zeriBadge('冲' + day.chong, 'red')], '宜：' + day.yi.slice(0, 10).join('　') + '<br>玉匣参考：' + day.info.xiu + '宿，' + day.info.zhiXing + '日');
  }).join('') : '<div class="zeri-panel zeri-empty">这段时间没有筛到合适日子，可以放宽范围再看。</div>';
}

function renderZeriRule() {
  var z = document.getElementById('zeriBride').value || '鼠';
  document.getElementById('zeriMarriageRule').innerHTML = '女命属' + z + '：大利月为农历' + ZERI_DALI[z].join('、') + '月；小利月为农历' + ZERI_XIAOLI[z].join('、') + '月。筛选时要求宜嫁娶、不忌嫁娶，并避开冲女命生肖。';
}

function renderZeriMarriage() {
  var bride = document.getElementById('zeriBride').value || '鼠';
  var days = Number(document.getElementById('zeriMarriageRange').value || 365);
  var results = scanZeri(days).map(function(day) {
    day.monthLevel = (ZERI_DALI[bride] || []).indexOf(day.lunarMonth) >= 0 ? '大利月' : ((ZERI_XIAOLI[bride] || []).indexOf(day.lunarMonth) >= 0 ? '小利月' : '平月');
    return day;
  }).filter(function(day) {
    return day.monthLevel !== '平月' && hasTerm(day.yi, ['嫁娶']) && !hasTerm(day.ji, ['嫁娶']) && day.chong !== bride;
  }).slice(0, 16);
  document.getElementById('zeriMarriageResults').innerHTML = results.length ? results.map(function(day) {
    return zeriDayCard(day, [zeriBadge(day.monthLevel), zeriBadge('宜嫁娶'), zeriBadge('避冲女命' + bride), zeriBadge(day.tian + day.luck, day.luck === '吉' ? '' : 'gold')], '女命' + bride + '，农历' + day.lunarMonth + '月为' + day.monthLevel + '。<br>玉匣参考：' + day.info.xiu + '宿，' + day.info.zhiXing + '日，冲' + day.chong + day.sha);
  }).join('') : '<div class="zeri-panel zeri-empty">严格筛选下暂时没有合适日子，可以延长范围再看。</div>';
}

function zeriDayCard(day, badges, body) {
  return '<article class="zeri-panel zeri-day-card"><div class="zeri-day-head"><div><h3>' + pad2(day.date.getMonth() + 1) + '月' + pad2(day.date.getDate()) + '日</h3><p>星期' + WN[day.date.getDay()] + '　' + day.title + '</p></div><span class="zeri-badge">' + day.info.dGz + '日</span></div><div class="zeri-badges">' + badges.join('') + '</div><p class="zeri-text">' + body + '</p></article>';
}

function zeriBadge(text, type) {
  return '<span class="zeri-badge ' + (type || '') + '">' + text + '</span>';
}

function compactList(list) {
  if (!list || !list.length) return '—';
  return list.slice(0, 4).join('、');
}

function cnMonth(n) {
  return ['一','二','三','四','五','六','七','八','九','十','十一','十二'][n - 1];
}

function cnDay(n) {
  if (n <= 10) return ['','一','二','三','四','五','六','七','八','九','十'][n];
  if (n < 20) return '十' + cnDay(n - 10);
  if (n === 20) return '二十';
  if (n < 30) return '二十' + cnDay(n - 20);
  if (n === 30) return '三十';
  return '三十一';
}

function buildSeasonLine(info) {
  var parts = [];
  if (info.jieQi) parts.push(info.jieQi);
  if (info.wuHou) parts.push(info.wuHou);
  if (!parts.length && info.zhiXing) parts.push(info.zhiXing);
  if (!parts.length && info.yueXiang) parts.push(info.yueXiang);
  return parts.length ? parts.join('　·　') : '岁时清和';
}

function renderYiJiPanel(info) {
  var h = '<div class="yi-ji-panel">';
  h += '<div class="yi-ji-col"><div class="yi-ji-head good">宜</div><div class="yi-ji-list">' + splitList(info.yi, 10) + '</div></div>';
  h += '<div class="yi-ji-col"><div class="yi-ji-head bad">忌</div><div class="yi-ji-list">' + splitList(info.ji, 10) + '</div></div>';
  h += '</div>';
  return h;
}

function splitList(list, limit) {
  if (!list || !list.length) return '无';
  return list.slice(0, limit).join('　');
}

function dateKey(sd) {
  return sd.year + '-' + pad2(sd.month) + '-' + pad2(sd.day);
}

function loadFavorites() {
  try {
    var raw = localStorage.getItem('xuan-shu-favorites');
    return raw ? JSON.parse(raw) : {};
  } catch(e) {
    return {};
  }
}

function saveFavorites() {
  localStorage.setItem('xuan-shu-favorites', JSON.stringify(favorites));
}

function isFavorite(sd) {
  return !!favorites[dateKey(sd)];
}

function buildDayRecord(sd, info) {
  return {
    key: dateKey(sd),
    year: sd.year,
    month: sd.month,
    day: sd.day,
    lunar: info.lMonthName + '月' + info.lDayName,
    ganzhi: info.yGz + '年 ' + info.mGz + '月 ' + info.dGz + '日',
    season: buildSeasonLine(info),
    yi: compactList(info.yi),
    ji: compactList(info.ji),
    savedAt: Date.now()
  };
}

function renderDayActions(sd) {
  var favText = isFavorite(sd) ? '已收藏' : '收藏';
  var favCls = isFavorite(sd) ? ' action-chip active' : ' action-chip';
  return '<div class="day-actions">' +
    '<button class="' + favCls + '" data-action="favorite">' + favText + '</button>' +
    '<button class="action-chip" data-action="share">分享</button>' +
    '</div>';
}

function toggleFavorite() {
  var sd = state.selectedDay;
  var info = getInfo(sd.year, sd.month, sd.day);
  if (!info) return;
  var key = dateKey(sd);
  if (favorites[key]) {
    delete favorites[key];
    showToast('已取消收藏');
  } else {
    favorites[key] = buildDayRecord(sd, info);
    showToast('已收藏到我的');
  }
  saveFavorites();
  renderSummary();
  if ($pageDetail.classList.contains('active')) renderDetailPage();
  if ($pageMine.classList.contains('active')) renderFavorites();
}

function buildShareText() {
  var sd = state.selectedDay;
  var info = getInfo(sd.year, sd.month, sd.day);
  if (!info) return '';
  return '我的万年历 · 玄枢｜' + sd.year + '年' + sd.month + '月' + sd.day + '日\n' +
    info.lMonthName + '月' + info.lDayName + '\n' +
    info.yGz + '年 ' + info.mGz + '月 ' + info.dGz + '日\n' +
    buildSeasonLine(info) + '\n' +
    '宜：' + compactList(info.yi) + '\n' +
    '忌：' + compactList(info.ji);
}

function writeClipboard(text, successText) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast(successText || '已复制');
    }).catch(function() {
      showToast('复制失败，请手动复制');
    });
  } else {
    showToast('当前浏览器不支持复制');
  }
}

function shareSelectedDay() {
  var text = buildShareText();
  if (!text) return;
  var shareData = {
    title: '我的万年历 · 玄枢',
    text: text,
    url: location.href.split('#')[0]
  };
  if (navigator.share) {
    navigator.share(shareData).then(function() {
      showToast('已打开分享');
    }).catch(function() {});
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    writeClipboard(text + '\n' + shareData.url, '已复制分享内容');
  } else {
    showToast('当前浏览器不支持分享');
  }
}

function renderFavorites() {
  if (!$favoriteList) return;
  var list = Object.keys(favorites).map(function(key) { return favorites[key]; })
    .sort(function(a, b) { return b.savedAt - a.savedAt; });
  var h = '<div class="mine-section">';
  h += '<div class="mine-section-title">我的收藏</div>';
  if (!list.length) {
    h += '<div class="mine-card"><div class="favorite-empty">还没有收藏的日子<br>在今日或黄历页点「收藏」即可保存</div></div>';
  } else {
    h += '<div class="favorite-list">';
    for (var i = 0; i < list.length; i++) {
      var item = list[i];
      h += '<button class="favorite-card" data-favorite-key="' + item.key + '">';
      h += '<div class="favorite-date">' + item.year + '年' + item.month + '月' + item.day + '日</div>';
      h += '<div class="favorite-lunar">' + item.lunar + '</div>';
      h += '<div class="favorite-meta">' + item.season + '</div>';
      h += '</button>';
    }
    h += '</div>';
  }
  h += '</div>';
  h += '<div class="mine-section"><div class="mine-section-title">常用</div><div class="mine-card">';
  h += '<button class="mine-row" data-mine-action="open-liuyao"><span>玄枢六爻</span><span class="mine-row-note">排盘工具</span></button>';
  h += '<button class="mine-row" data-mine-action="open-bazi"><span>玄枢八字</span><span class="mine-row-note">四柱排盘</span></button>';
  h += '<button class="mine-row" data-mine-action="open-articles"><span>玄枢知识</span><span class="mine-row-note">历法民俗入门</span></button>';
  h += '<button class="mine-row" data-mine-action="feedback"><span>意见反馈</span><span class="mine-row-note">复制邮箱</span></button>';
  h += '<button class="mine-row" data-mine-action="email"><span>打开邮件</span><span class="mine-row-note">发送建议</span></button>';
  h += '<button class="mine-row" data-mine-action="share-app"><span>分享应用</span><span class="mine-row-note">推荐给朋友</span></button>';
  h += '</div></div>';
  h += '<div class="mine-section"><div class="mine-section-title">关于玄枢</div><div class="mine-card">';
  h += '<div class="mine-about">我的万年历 · 玄枢，提供传统历法与民俗文化参考。<br>当前版本：' + APP_VERSION + '<br>微信：' + WECHAT_ID + '<br>收藏数据仅保存在本机。<br>内容不作为医疗、法律、投资等专业建议。</div>';
  h += '<button class="mine-row" data-mine-action="wechat"><span>复制微信号</span><span class="mine-row-note">' + WECHAT_ID + '</span></button>';
  h += '</div></div>';
  h += '<div class="mine-version">我的万年历 · 玄枢 · ' + APP_VERSION + '<br>感谢每一条认真建议</div>';
  $favoriteList.innerHTML = h;
}

function handleMineAction(action) {
  if (action === 'feedback') {
    writeClipboard(FEEDBACK_EMAIL, '反馈邮箱已复制');
    return;
  }
  if (action === 'open-liuyao') {
    location.href = 'liuyao/';
    return;
  }
  if (action === 'open-bazi') {
    location.href = 'bazi/';
    return;
  }
  if (action === 'open-articles') {
    location.href = 'articles/';
    return;
  }
  if (action === 'email') {
    location.href = 'mailto:' + FEEDBACK_EMAIL + '?subject=' + encodeURIComponent('我的万年历反馈 ' + APP_VERSION);
    return;
  }
  if (action === 'wechat') {
    writeClipboard(WECHAT_ID, '微信号已复制');
    return;
  }
  if (action === 'share-app') {
    shareApp();
  }
}

function shareApp() {
  var url = location.href.split('#')[0];
  var text = '我的万年历 · 玄枢：传统历法与民俗文化参考工具。';
  if (navigator.share) {
    navigator.share({ title: '我的万年历 · 玄枢', text: text, url: url }).then(function() {
      showToast('已打开分享');
    }).catch(function() {});
  } else {
    writeClipboard(text + '\n' + url, '应用链接已复制');
  }
}

function showToast(text) {
  if (!$appToast) return;
  clearTimeout(toastTimer);
  $appToast.textContent = text;
  $appToast.classList.add('show');
  toastTimer = setTimeout(function() {
    $appToast.classList.remove('show');
  }, 1800);
}

/* ============================================
   渲染今日摘要
   ============================================ */
function renderSummary() {
  var sd = state.selectedDay;
  if (!sd) return;

  var info = getInfo(sd.year, sd.month, sd.day);
  if (!info) {
    $todaySummary.innerHTML = '<div style="text-align:center;color:var(--text-faint);padding:20px;">暂无数据</div>';
    return;
  }

  var h = '';
  var specials = [];
  if (info.jieQi) specials.push({text: info.jieQi, cls: 'jf-gold'});
  if (info.festivals.length) {
    for (var i = 0; i < info.festivals.length; i++) specials.push({text: info.festivals[i], cls: 'jf-red'});
  }
  if (info.solarFestivals.length) {
    for (var j = 0; j < info.solarFestivals.length; j++) specials.push({text: info.solarFestivals[j], cls: 'jf-red'});
  }

  h += '<div class="summary-kicker">';
  h += '<span>' + sd.year + ' / ' + pad2(sd.month) + ' / ' + pad2(sd.day) + ' · 星期' + WN[info.week] + '</span>';
  h += '<span class="summary-pill">' + (specials.length ? specials[0].text : info.dGz + '日') + '</span>';
  h += '</div>';

  // 农历大字（去掉「农历」前缀）
  h += '<div class="lunar-big">' + info.lMonthName + '月' + info.lDayName + '</div>';

  // 公历
  h += '<div class="solar-info">' + sd.year + '年' + sd.month + '月' + sd.day + '日 · 星期' + WN[info.week] + '</div>';

  // 干支
  h += '<div class="ganzhi-line">' + info.yGz + '年 · ' + info.mGz + '月 · ' + info.dGz + '日</div>';

  // 节气 / 节日
  if (specials.length) {
    h += '<div class="jieqi-fest">';
    for (var k = 0; k < specials.length; k++) {
      h += '<span class="' + specials[k].cls + '">' + specials[k].text + '</span>';
    }
    h += '</div>';
  }

  h = '';
  h += '<div class="quiet-text">观天时，知四序</div>';
  h += '<div class="date-line">' + sd.year + '年　' + cnMonth(sd.month) + '月' + cnDay(sd.day) + '</div>';
  h += '<div class="lunar-title">' + info.lMonthName + '月' + info.lDayName + '</div>';
  h += '<div class="ganzhi-title">' + info.yGz + '年　' + info.mGz + '月　' + info.dGz + '日</div>';
  h += '<div class="ornament-line">✺</div>';
  h += '<div class="season-line">' + buildSeasonLine(info) + '</div>';
  h += renderDayActions(sd);
  h += '<div class="ink-scene"></div>';
  h += renderYiJiPanel(info);

  $todaySummary.innerHTML = h;
  if ($monthCard) {
    $monthCard.innerHTML = '<div class="month-card-row"><div><div class="month-card-title">' + info.lMonthName + '月' + info.lDayName + '</div><div class="month-card-sub">' + info.yGz + '年　' + info.mGz + '月　' + info.dGz + '日<br>' + buildSeasonLine(info) + '</div></div><button class="plain-icon" id="btnMonthDetail">›</button></div>';
    var md = document.getElementById('btnMonthDetail');
    if (md) md.addEventListener('click', function(){ showPage('detail'); });
  }
}

/* ============================================
   渲染详情页
   ============================================ */
function renderDetailPage() {
  var sd = state.selectedDay;
  if (!sd) return;

  var info = getInfo(sd.year, sd.month, sd.day);
  if (!info) return;

  $detailTitle.textContent = '今日黄历';

  var h = '';

  // ── 日期 ──
  h += '<div class="book-title-date">';
  h += '<div class="bt-solar">' + sd.year + '年' + sd.month + '月' + sd.day + '日</div>';
  h += '<div class="bt-lunar">' + info.lMonthName + '月' + info.lDayName + '</div>';
  h += '<div class="bt-ganzhi">' + info.yGz + '年 · ' + info.mGz + '月 · ' + info.dGz + '日</div>';
  h += '</div>';
  h += renderDayActions(sd);

  // ── 节气 ──
  var jqParts = [];
  if (info.jieQi) jqParts.push(info.jieQi);
  if (info.wuHou) jqParts.push(info.wuHou);
  if (jqParts.length) {
    h += '<div class="book-jieqi">' + jqParts.join(' · ') + '</div>';
  }

  h += '<div class="book-line"></div>';

  // ── 建除 + 冲煞 ──
  if (info.zhiXing || info.chongSx) {
    h += '<div class="book-section">';
    h += '<div class="book-grid">';
    if (info.zhiXing) h += '<div class="bg-cell"><span class="bg-k">建除</span>' + info.zhiXing + '</div>';
    if (info.chongSx || info.sha) {
      var cs = '';
      if (info.chongSx) cs += '冲' + info.chongSx + (info.chongGz ? '（' + info.chongGz + '）' : '');
      if (info.sha) cs += '　煞' + info.sha;
      h += '<div class="bg-cell"><span class="bg-k">冲煞</span>' + cs + '</div>';
    }
    h += '</div></div>';
  }

  h += '<div class="book-line"></div>';

  // ── 宜忌 — 左右对称主视觉 ──
  if (info.yi.length || info.ji.length) {
    h += '<div class="yiji-book">';
    h += '<div class="yiji-col yi"><div class="yj-head">宜</div><div class="yiji-items-four">';
    if (info.yi.length) {
      for (var i = 0; i < info.yi.length; i++) h += '<div class="yj-item">' + info.yi[i] + '</div>';
    } else {
      h += '<div class="yj-item" style="color:var(--text-faint)">—</div>';
    }
    h += '</div></div>';
    h += '<div class="yiji-col ji"><div class="yj-head">忌</div><div class="yiji-items-four">';
    if (info.ji.length) {
      for (var i = 0; i < info.ji.length; i++) h += '<div class="yj-item">' + info.ji[i] + '</div>';
    } else {
      h += '<div class="yj-item" style="color:var(--text-faint)">—</div>';
    }
    h += '</div></div></div>';
  }

  // ── 更多黄历信息 收起/展开 ──
  h += '<div class="book-line"></div>';
  h += '<div class="more-toggle" id="moreToggle"><span class="more-arrow">展开更多</span></div>';
  h += '<div class="more-content" id="moreContent" style="display:none">';

  // 吉神凶煞
  if (info.jiShen.length || info.xiongSha.length) {
    h += '<div class="book-section">';
    h += '<div class="book-label">吉 神 凶 煞</div>';
    if (info.jiShen.length) h += '<div class="book-row shen-list">' + info.jiShen.join('　') + '</div>';
    if (info.xiongSha.length) h += '<div class="book-row sha-list">' + info.xiongSha.join('　') + '</div>';
    h += '</div>';
  }

  // 星历
  var hasMore = info.xiu || info.liuYao || info.jiuXing || info.naYin || info.yueXiang;
  if (hasMore) {
    h += '<div class="book-section">';
    h += '<div class="book-label">星 历</div>';
    h += '<div class="book-grid">';
    if (info.xiu) h += '<div class="bg-cell"><span class="bg-k">星宿</span>' + info.xiu + '</div>';
    if (info.liuYao) h += '<div class="bg-cell"><span class="bg-k">六曜</span>' + info.liuYao + '</div>';
    if (info.naYin) h += '<div class="bg-cell"><span class="bg-k">纳音</span>' + info.naYin + '</div>';
    if (info.jiuXing) {
      var jx = typeof info.jiuXing.toFullString === 'function' ? info.jiuXing.toFullString() : info.jiuXing.toString();
      h += '<div class="bg-cell"><span class="bg-k">九星</span>' + jx + '</div>';
    }
    if (info.yueXiang) h += '<div class="bg-cell"><span class="bg-k">月相</span>' + info.yueXiang + '</div>';
    h += '</div></div>';
  }

  // 胎神
  if (info.taiShen) {
    h += '<div class="book-section">';
    h += '<div class="book-label">胎 神</div>';
    h += '<div class="book-row">' + info.taiShen + '</div></div>';
  }

  // 彭祖百忌
  if (info.pengZuG || info.pengZuZ) {
    h += '<div class="book-section">';
    h += '<div class="book-label">彭 祖 百 忌</div>';
    h += '<div class="book-row" style="line-height:2.2;">';
    if (info.pengZuG) h += info.pengZuG;
    if (info.pengZuG && info.pengZuZ) h += '<br>';
    if (info.pengZuZ) h += info.pengZuZ;
    h += '</div></div>';
  }

  // 吉神方位
  if (info.posXi || info.posFu || info.posCai) {
    h += '<div class="book-section">';
    h += '<div class="book-label">吉 神 方 位</div>';
    h += '<div class="book-grid">';
    if (info.posXi) h += '<div class="bg-cell"><span class="bg-k">喜神</span>' + info.posXi + '</div>';
    if (info.posFu) h += '<div class="bg-cell"><span class="bg-k">福神</span>' + info.posFu + '</div>';
    if (info.posCai) h += '<div class="bg-cell"><span class="bg-k">财神</span>' + info.posCai + '</div>';
    h += '</div></div>';
  }

  // 时令
  if (info.fu || info.shuJiu) {
    h += '<div class="book-section">';
    h += '<div class="book-label">时 令</div>';
    h += '<div class="book-row">';
    if (info.fu) {
      var fv = typeof info.fu.toFullString === 'function' ? info.fu.toFullString() : info.fu.toString();
      h += fv;
    }
    if (info.fu && info.shuJiu) h += '　';
    if (info.shuJiu) {
      var sv = typeof info.shuJiu.toFullString === 'function' ? info.shuJiu.toFullString() : info.shuJiu.toString();
      h += sv;
    }
    h += '</div></div>';
  }

  h += '</div>';
  h += '<div style="height:0.5px;background:var(--border);margin:24px 0 0;opacity:0.3;"></div>';

  $detailContent.innerHTML = h;

  // 绑定更多展开
  var moreTog = document.getElementById('moreToggle');
  if (moreTog) {
    moreTog.addEventListener('click', function() {
      var mc = document.getElementById('moreContent');
      var ma = document.querySelector('.more-arrow');
      if (mc.style.display === 'none') {
        mc.style.display = 'block';
        if (ma) ma.textContent = '收起';
      } else {
        mc.style.display = 'none';
        if (ma) ma.textContent = '展开更多';
      }
    });
  }
}

/* ============================================
   导航
   ============================================ */
function goPrev() {
  if (state.month === 1) { state.year--; state.month = 12; }
  else { state.month--; }
  syncSelectedDay();
  renderCalendar();
  renderSummary();
  applySeason();
}

function goNext() {
  if (state.month === 12) { state.year++; state.month = 1; }
  else { state.month++; }
  syncSelectedDay();
  renderCalendar();
  renderSummary();
  applySeason();
}

function goToday() {
  var now = new Date();
  state.year = now.getFullYear();
  state.month = now.getMonth() + 1;
  state.selectedDay = { year: state.year, month: state.month, day: now.getDate() };
  renderCalendar();
  renderSummary();
  applySeason();
}

function syncSelectedDay() {
  var keep = state.selectedDay ? state.selectedDay.day : 1;
  var dim = new Date(state.year, state.month, 0).getDate();
  state.selectedDay = { year: state.year, month: state.month, day: Math.min(keep, dim) };
}

document.getElementById('btnPrev').addEventListener('click', goPrev);
document.getElementById('btnNext').addEventListener('click', goNext);
var btnToday = document.getElementById('btnToday');
if (btnToday) btnToday.addEventListener('click', goToday);

/* ============================================
   滑动
   ============================================ */
var touchX = 0;
document.addEventListener('touchstart', function(e) {
  touchX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', function(e) {
  var diff = touchX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) goNext();
    else goPrev();
  }
});

/* ============================================
   键盘
   ============================================ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 't' || e.key === 'T') goToday();
  if (e.key === 'Escape') showPage('home');
});

/* ============================================
   启动
   ============================================ */
renderCalendar();
renderSummary();
renderFavorites();
applySeason();

/* 极微节气色调 — 潜意识季节气息 */
function applySeason() {
  var info = getInfo(state.selectedDay.year, state.selectedDay.month, state.selectedDay.day);
  var jq = info ? info.jieQi : '';
  var m = state.selectedDay.month;
  // 按月份大致分四季，微微调整背景色温
  var tint = '';
  if (m >= 2 && m <= 4) tint = 'rgba(91,130,100,0.008)';      // 春：极微青
  else if (m >= 5 && m <= 7) tint = 'rgba(140,110,70,0.008)';    // 夏：极微暖
  else if (m >= 8 && m <= 10) tint = 'rgba(100,120,140,0.008)';  // 秋：极微清
  else tint = 'rgba(80,90,110,0.006)';                            // 冬：极微寂
  var home = document.getElementById('pageHome');
  if (home && tint) {
    home.style.backgroundBlendMode = 'overlay';
    home.style.backgroundColor = tint;
  }
}

// 启动页 3 秒后淡出，首页同步淡入
setTimeout(function() {
  var splash = document.getElementById('splash');
  var home = document.getElementById('pageHome');
  if (splash) {
    splash.classList.add('hide');
    setTimeout(function() { splash.remove(); }, 1100);
  }
  // 首页从透明淡入
  if (home) {
    home.style.transition = 'opacity 1.05s ease';
    home.style.opacity = '1';
  }
}, 3000);
</script>
